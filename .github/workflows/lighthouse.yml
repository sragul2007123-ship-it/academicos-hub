name: "Lighthouse CI"

on:
  push:
    branches: [ main, feat/academicos-starter ]
  pull_request:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ci:build

      - name: Start server
        run: npm run ci:start &
        shell: bash

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse
        run: npx lighthouse http://localhost:3000 --output=json --output-path=lhreport.json --only-categories=performance,accessibility,best-practices,seo --chrome-flags="--no-sandbox --headless"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lhreport.json

      - name: Print summary
        run: |
          jq '.categories | map_values(.score) | to_entries[] | "Category: \(.key) - Score: \(.value * 100)"' lhreport.json || true
