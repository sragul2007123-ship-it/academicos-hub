name: "Notify on Workflow Failure"

on:
  workflow_run:
    types: [completed]

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build failure summary
        id: summary
        run: |
          echo "WORKFLOW_NAME=$(echo '${{ github.event.workflow_run.name }}')" >> $GITHUB_OUTPUT
          echo "CONCLUSION=$(echo '${{ github.event.workflow_run.conclusion }}')" >> $GITHUB_OUTPUT
          echo "URL=$(echo '${{ github.event.workflow_run.html_url }}')" >> $GITHUB_OUTPUT

      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[ACADEMICOS] Workflow failed: ${{ github.event.workflow_run.name }}"
          body: |
            The GitHub Actions workflow `${{ github.event.workflow_run.name }}` has finished with conclusion: `${{ github.event.workflow_run.conclusion }}`.

            Repository: ${{ github.repository }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Run URL: ${{ github.event.workflow_run.html_url }}

            Commit: ${{ github.event.workflow_run.head_commit.id }}

            Triggered by: ${{ github.event.sender.login }}

            This is an automated alert. Check the run for logs and failure details.
          to: ${{ secrets.NOTIFY_TO }}
          from: ${{ secrets.NOTIFY_FROM }}